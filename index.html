<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)">
  <title>CashBoxes Pro</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://api.cloudinary.com" crossorigin>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <button class="iconbtn" id="btnMenu" aria-label="القائمة">
        <span class="hamburger" aria-hidden="true"></span>
      </button>
      <div class="brand">
        <div class="logo">CB</div>
        <div>
          <div class="title">CashBoxes Pro</div>
          <div class="subtitle" id="subtitle">إدارة صناديق ومعاملات</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="chip" id="btnInstall" hidden>تثبيت</button>
        <button class="iconbtn" id="btnTheme" aria-label="المظهر">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M12 18a6 6 0 0 1 0-12a6 6 0 0 1 0 12Zm0 4a1 1 0 0 1-1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1-1 1Zm0-18a1 1 0 0 1-1-1V2a1 1 0 0 1 2 0v1a1 1 0 0 1-1 1Zm10 9a1 1 0 0 1-1 1h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 1 1ZM4 12a1 1 0 0 1-1 1H2a1 1 0 0 1 0-2h1a1 1 0 0 1 1 1Zm15.07 7.07a1 1 0 0 1-1.41 0l-.7-.7a1 1 0 0 1 1.41-1.41l.7.7a1 1 0 0 1 0 1.41ZM7.05 7.05a1 1 0 0 1-1.41 0l-.7-.7A1 1 0 0 1 6.35 4.94l.7.7a1 1 0 0 1 0 1.41Zm12.02-1.41a1 1 0 0 1 0 1.41l-.7.7a1 1 0 0 1-1.41-1.41l.7-.7a1 1 0 0 1 1.41 0ZM7.05 16.95a1 1 0 0 1 0 1.41l-.7.7a1 1 0 0 1-1.41-1.41l.7-.7a1 1 0 0 1 1.41 0Z"/></svg>
        </button>
      </div>
    </header>

    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-head">
        <div class="drawer-title">القائمة</div>
        <button class="iconbtn" id="btnCloseDrawer" aria-label="إغلاق">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59L7.11 5.7A1 1 0 1 0 5.7 7.11L10.59 12l-4.9 4.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.9a1 1 0 0 0 1.41-1.41L13.41 12l4.9-4.89a1 1 0 0 0-.01-1.4Z"/></svg>
        </button>
      </div>
      <nav class="drawer-nav">
        <button class="navitem active" data-route="dashboard">لوحة التحكم</button>
        <button class="navitem" data-route="cashboxes">الصناديق</button>
        <button class="navitem" data-route="reports">التقارير</button>
        <button class="navitem" data-route="settings">الإعدادات</button>
        <div class="nav-sep"></div>
        <button class="navitem danger" id="btnSignOut" hidden>تسجيل خروج</button>
      </nav>
      <div class="drawer-foot">
        <div class="tiny" id="authState">غير مسجّل</div>
        <div class="tiny">v1.0</div>
      </div>
    </aside>
    <div class="backdrop" id="backdrop" hidden></div>

    <main class="main" id="main">
      <!-- Screens rendered here -->
    </main>

    <nav class="bottomnav">
      <button class="bn active" data-route="dashboard">
        <span class="bn-ico">🏠</span><span class="bn-txt">الرئيسية</span>
      </button>
      <button class="bn" data-route="cashboxes">
        <span class="bn-ico">🧰</span><span class="bn-txt">الصناديق</span>
      </button>
      <button class="bn" data-route="reports">
        <span class="bn-ico">📊</span><span class="bn-txt">تقارير</span>
      </button>
      <button class="bn" data-route="settings">
        <span class="bn-ico">⚙️</span><span class="bn-txt">إعدادات</span>
      </button>
    </nav>

    <div class="toast" id="toast" hidden></div>
    <div class="modal" id="modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true">
        <div class="modal-head">
          <div class="modal-title" id="modalTitle">عنوان</div>
          <button class="iconbtn" id="modalClose" aria-label="إغلاق">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59L7.11 5.7A1 1 0 1 0 5.7 7.11L10.59 12l-4.9 4.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.9a1 1 0 0 0 1.41-1.41L13.41 12l4.9-4.89a1 1 0 0 0-.01-1.4Z"/></svg>
          </button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot" id="modalFoot"></div>
      </div>
    </div>
  </div>

  <!-- SheetJS for Excel import/export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js" defer></script>
  <script type="module" src="app.js"></script>
</body>
</html>
